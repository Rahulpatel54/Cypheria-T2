[graph]
targets = []

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = []
vulnerability = "deny"
unmaintained = "warn"
yanked = "deny"
notice = "warn"

[licenses]
unlicensed = "deny"
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-DFS-2016",
  "CC0-1.0",
  "Zlib",
  "MPL-2.0",
]
copyleft = "warn"

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

# reqwest is pulled in by tauri — verify it makes no outbound calls in our code paths
[[bans.skip]]
name = "reqwest"
reason = "Transitive tauri dependency; our code does not call it directly. Verified no outbound requests from app code."

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]